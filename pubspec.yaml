name: igobi
description: IGOBI Mobile — Empowering Women. Enabling Better Living.
publish_to: "none"
# version + buildNumber. Bump version (left of +) for any user-visible change;
# bump buildNumber (right of +) for every store upload.
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  video_player: ^2.9.2
  webview_flutter: ^4.10.0
  sentry_flutter: ^8.10.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

# -----------------------------------------------------------------------
# App icon generation. Run:
#   flutter pub get
#   dart run flutter_launcher_icons
# Source asset is the square logo-mark. We use it for the foreground of the
# Android adaptive icon over a brand-emerald background.
# -----------------------------------------------------------------------
flutter_launcher_icons:
  image_path: "assets/brand/logo-mark.jpeg"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#047857"   # AppColors.emerald
  adaptive_icon_foreground: "assets/brand/logo-mark.jpeg"
  min_sdk_android: 23

# -----------------------------------------------------------------------
# Native splash screen. Run:
#   dart run flutter_native_splash:create
# Emerald background with the logo-mark centred. Android 12+ uses its own
# splash API (icon + background colour), iOS uses the storyboard.
# -----------------------------------------------------------------------
flutter_native_splash:
  color: "#047857"             # AppColors.emerald
  image: "assets/brand/logo-mark.jpeg"
  android: true
  ios: true
  fullscreen: false
  android_12:
    color: "#047857"
    image: "assets/brand/logo-mark.jpeg"
    icon_background_color: "#047857"
